[workspace]
authors = ["Tim Yang <manchestim@hotmail.com>"]
channels = ["conda-forge"]
name = "TWAIN"
platforms = ["osx-arm64", "linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "3.12.*"
jsonschema = "*"

# Per-workstream features: branches add their own dependencies here as needed,
# e.g. [feature.workflows.dependencies] quacc/jobflow for WorkflowManagers.

[feature.sim.dependencies]
ase = "*"
pymatgen = "*"

[feature.sim.tasks]
benchmark = "python Benchmark/run_benchmark.py"

[environments]
default = []
benchmark = ["sim"]
